services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_gateway_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - api_gateway

  nginx:
    image: nginx:alpine
    container_name: api_gateway_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - api_gateway

  postgres:
    image: postgres:16
    container_name: api_gateway_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api_gateway

  redis:
    image: redis:alpine
    container_name: api_gateway_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - api_gateway

  mailpit:
    image: axllent/mailpit
    container_name: api_gateway_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - api_gateway

networks:
  api_gateway:
    driver: bridge

volumes:
  postgres_data:
